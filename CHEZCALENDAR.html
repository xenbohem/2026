<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chez Moi Cafe • Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Vampiro+One&family=Klee+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #0a0a1a 0%, #1a0033 50%, #000 100%);
  color: #e6e6fa;
  font-family: 'Klee One', sans-serif;
  overflow-x: hidden;
  min-height: 100vh;
}
.vampire-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 20%, rgba(255,77,166,0.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(138,43,226,0.1) 0%, transparent 50%),
    linear-gradient(135deg, #10002b 0%, #1a0033 100%);
  z-index: -1;
}
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
}
.header {
  text-align: center;
  padding: 40px 20px;
}
.title {
  font-family: 'Vampiro One', cursive;
  font-size: clamp(2.5rem, 6vw, 4rem);
  background: linear-gradient(45deg, #ff4da6, #ff1493, #8a2be2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 30px rgba(255,77,166,0.6);
  margin-bottom: 10px;
  animation: titleGlow 4s ease-in-out infinite alternate;
}
@keyframes titleGlow {
  from { filter: drop-shadow(0 0 15px #ff4da6); }
  to { filter: drop-shadow(0 0 35px #8a2be2); }
}
.hansel-chat {
  background: rgba(26,26,46,0.9);
  border: 1px solid rgba(138,43,226,0.4);
  border-radius: 20px;
  padding: 25px;
  margin: 30px 0;
  backdrop-filter: blur(20px);
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
  text-align: center;
}
.hansel-avatar {
  width: 80px;
  height: 80px;
  background: linear-gradient(45deg, #ff4da6, #8a2be2);
  border-radius: 50%;
  margin: 0 auto 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  box-shadow: 0 0 30px rgba(255,77,166,0.5);
  animation: hanselFloat 3s ease-in-out infinite;
}
@keyframes hanselFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.hansel-text {
  font-size: 1.3rem;
  line-height: 1.6;
  color: #ff4da6;
  font-family: 'Klee One', sans-serif;
  text-shadow: 0 0 10px rgba(255,77,166,0.5);
}
.username-input {
  display: none;
  margin-top: 20px;
}
.username-input input {
  padding: 12px 20px;
  background: rgba(0,0,0,0.7);
  border: 2px solid #8a2be2;
  border-radius: 25px;
  color: #e6e6fa;
  font-family: 'Klee One', sans-serif;
  font-size: 1.1rem;
  text-align: center;
  width: 250px;
  max-width: 90vw;
}
.username-input input::placeholder {
  color: #888;
}
.calendar-container {
  background: rgba(26,26,46,0.95);
  border-radius: 25px;
  padding: 30px;
  border: 1px solid rgba(138,43,226,0.3);
  backdrop-filter: blur(25px);
  margin: 30px 0;
  overflow: hidden;
}
.month-header {
  text-align: center;
  margin-bottom: 30px;
}
.month-title {
  font-family: 'Vampiro One', cursive;
  font-size: 2.5rem;
  background: linear-gradient(45deg, cornflowerblue, #8a2be2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
  text-shadow: 0 0 20px rgba(135,206,250,0.6);
}
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  max-width: 800px;
  margin: 0 auto;
}
.day-header {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Vampiro One', cursive;
  font-size: 1rem;
  color: #ff4da6;
  background: rgba(255,77,166,0.1);
  border-radius: 12px;
  font-weight: bold;
  text-shadow: 0 0 8px rgba(255,77,166,0.4);
}
.calendar-day {
  aspect-ratio: 1;
  background: rgba(15,15,35,0.8);
  border: 1px solid rgba(138,43,226,0.2);
  border-radius: 12px;
  padding: 8px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.calendar-day:hover {
  background: rgba(138,43,226,0.15);
  border-color: #ff4da6;
  transform: scale(1.05);
  box-shadow: 0 8px 25px rgba(138,43,226,0.3);
}
.calendar-day.today {
  background: linear-gradient(135deg, #ff4da6, #ff1493);
  color: white;
  border-color: gold;
  box-shadow: 0 0 20px #ff4da6;
}
.day-number {
  font-weight: bold;
  font-size: 1rem;
  color: #ff4da6;
}
.day-notes {
  font-size: 0.75rem;
  opacity: 0.8;
  word-break: break-word;
  flex-grow: 1;
  min-height: 40px;
}
.mantras {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  margin: 50px 0;
  opacity: 0;
  animation: fadeInUp 1s ease-out 2s forwards;
}
.mantra {
  background: rgba(26,26,46,0.7);
  border: 1px solid rgba(255,77,166,0.3);
  border-radius: 18px;
  padding: 25px;
  text-align: center;
  transition: all 0.4s ease;
  backdrop-filter: blur(15px);
}
.mantra:hover {
  border-color: #ff4da6;
  box-shadow: 0 15px 40px rgba(255,77,166,0.3);
  transform: translateY(-5px);
}
.mantra-icon {
  font-size: 2.5rem;
  color: #ff4da6;
  margin-bottom: 15px;
}
.mantra-text {
  font-family: 'Vampiro One', cursive;
  font-size: 1.4rem;
  color: #ff4da6;
  margin-bottom: 10px;
  text-shadow: 0 0 10px rgba(255,77,166,0.4);
}
.footer {
  text-align: center;
  padding: 50px 20px;
  color: #b19cd9;
  font-size: 1rem;
  opacity: 0.8;
}
@media (max-width: 768px) {
  .calendar-grid { gap: 4px; }
  .calendar-day { font-size: 0.75rem; padding: 6px; }
  .mantras { grid-template-columns: 1fr; }
}
</style>
</head>
<body class="vampire-bg">
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="title">Calendar</div>
    </div>

    <!-- Hansel Greeting -->
    <div class="hansel-chat" id="hanselChat">
      <div class="hansel-avatar">🧙‍♂️</div>
      <div class="hansel-text" id="greetingText">
        Greetings, traveler...
      </div>
      <div class="username-input" id="usernameInput">
        <input type="text" id="usernameField" placeholder="What shall I call you?" maxlength="20" autofocus>
      </div>
    </div>

    <!-- Monthly Calendar -->
    <div class="calendar-container">
      <div class="month-header">
        <div class="month-title" id="monthTitle">January 2024</div>
      </div>
      <div class="calendar-grid" id="calendarGrid">
        <!-- Days generated by JS -->
      </div>
    </div>

    <!-- Daily Mantras -->
    <div class="mantras">
      <div class="mantra">
        <div class="mantra-icon">🌙</div>
        <div class="mantra-text">"The night whispers secrets to those who listen"</div>
      </div>
      <div class="mantra">
        <div class="mantra-icon">✨</div>
        <div class="mantra-text">"Every step carves your legend in starlight"</div>
      </div>
      <div class="mantra">
        <div class="mantra-icon">💜</div>
        <div class="mantra-text">"Dreams bloom where shadows dance"</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div style="font-family:'Vampiro One',cursive;font-size:1.4rem;color:#ff4da6;margin-bottom:8px;">
        Made with 💜
      </div>
      <div>ChezXen</div>
    </div>
  </div>

<script>
// Current month data
const currentDate = new Date();
const currentMonth = currentDate.getMonth();
const currentYear = currentDate.getFullYear();
const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

// Username handling
let username = localStorage.getItem('username') || '';

function greetUser() {
  const greeting = document.getElementById('greetingText');
  const inputDiv = document.getElementById('usernameInput');
  const inputField = document.getElementById('usernameField');
  
  if (username) {
    greeting.innerHTML = `
      Greetings, <span style="color:#ff4da6;font-family:'Vampiro One',cursive;">${username}</span>...<br>
      ${monthNames[currentMonth]} unfurls before you.<br>
      What dreams shall we manifest today? ✨
    `;
    inputDiv.style.display = 'none';
  } else {
    setTimeout(() => {
      greeting.innerHTML = 'May I know your name, traveler?';
      inputDiv.style.display = 'block';
      inputField.focus();
    }, 2000);
  }
}

document.getElementById('usernameField').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    const name = e.target.value.trim();
    if (name) {
      username = name;
      localStorage.setItem('username', username);
      greetUser();
    }
  }
});

// Generate calendar
function generateCalendar() {
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = currentDate.getDate();
  
  document.getElementById('monthTitle').textContent = `${monthNames[currentMonth]} ${currentYear}`;
  
  const grid = document.getElementById('calendarGrid');
  const dayHeaders = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  
  // Day headers
  dayHeaders.forEach(day => {
    const header = document.createElement('div');
    header.className = 'day-header';
    header.textContent = day;
    grid.appendChild(header);
  });
  
  // Empty days before month starts
  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement('div');
    grid.appendChild(empty);
  }
  
  // Calendar days
  for (let day = 1; day <= daysInMonth; day++) {
    const dayDiv = document.createElement('div');
    dayDiv.className = 'calendar-day';
    if (day === today) dayDiv.classList.add('today');
    
    dayDiv.innerHTML = `
      <div class="day-number">${day}</div>
      <div class="day-notes" contenteditable="true" data-day="${day}" placeholder="Whisper your intentions..."></div>
    `;
    
    dayDiv.addEventListener('click', () => {
      dayDiv.querySelector('.day-notes').focus();
    });
    
    grid.appendChild(dayDiv);
  }
  
  loadNotes();
}

// Save/load notes
function saveNotes() {
  const notes = {};
  document.querySelectorAll('.day-notes').forEach(note => {
    if (note.textContent.trim()) {
      notes[note.dataset.day] = note.textContent.trim();
    }
  });
  localStorage.setItem(`calendarNotes_${currentMonth}_${currentYear}`, JSON.stringify(notes));
}

function loadNotes() {
  const saved = localStorage.getItem(`calendarNotes_${currentMonth}_${currentYear}`);
  if (saved) {
    const notes = JSON.parse(saved);
    document.querySelectorAll('.day-notes').forEach(note => {
      const dayNotes = notes[note.dataset.day];
      if (dayNotes) note.textContent = dayNotes;
    });
  }
}

// Auto-save notes
document.addEventListener('input', (e) => {
  if (e.target.classList.contains('day-notes')) {
    saveNotes();
  }
});

// Rotate months
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') {
    currentMonth = (currentMonth - 1 + 12) % 12;
    if (currentMonth === 11) currentYear--;
    generateCalendar();
  } else if (e.key === 'ArrowRight') {
    currentMonth = (currentMonth + 1) % 12;
    if (currentMonth === 0) currentYear++;
    generateCalendar();
  }
});

// Initialize
window.addEventListener('load', () => {
  greetUser();
  generateCalendar();
  
  // Month rotation instructions
  setTimeout(() => {
    console.log('👻 Arrow keys: ← Previous month | → Next month');
  }, 1000);
});
</script>
</body>
</html>
