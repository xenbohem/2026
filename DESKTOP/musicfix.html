<!DOCTYPE html>
<html lang="en">
<head><script src="/.nekoweb-api/static/site.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rose OS | Master</title>
    <style>
        :root {
            --rose-light: #ffd1dc;
            --rose-main: #e5b3b3;
            --rose-dark: #6d4c4c;
            --glass: rgba(255, 255, 255, 0.2);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Georgia', serif;
            background: #fff5f6; overflow: hidden;
            color: var(--rose-dark);
        }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            position: fixed; inset: 0; z-index: 2000;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .grid { display: grid; grid-template-columns: repeat(10, 35px); grid-gap: 5px; }
        .cell {
            width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 0.9rem; color: #ccc; transition: 0.2s;
        }
        .cell.selected { background: var(--rose-light); color: var(--rose-dark); border-radius: 4px; }
        .cell.found { background: var(--rose-dark) !important; color: var(--rose-light) !important; border-radius: 4px; }

        /* --- DESKTOP LAYERS --- */
        #desktop { display: none; height: 100%; width: 100%; position: relative; background: url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=2000') center/cover; }
        #rain-layer, #petal-layer { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
        .drop { position: absolute; width: 1px; height: 60px; background: linear-gradient(transparent, var(--rose-light)); opacity: 0.2; animation: fall linear infinite; }
        .petal { position: absolute; background: var(--rose-light); border-radius: 50% 0 50% 50%; opacity: 0.5; animation: drift linear infinite; }
        @keyframes fall { to { transform: translateY(100vh); } }
        @keyframes drift { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }

        /* --- UI COMPONENTS --- */
        #search-container { position: absolute; top: 30px; width: 100%; display: flex; justify-content: center; z-index: 10; }
        #rose-search {
            width: 180px; padding: 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05); color: var(--rose-dark); text-align: center;
            transition: 0.5s; outline: none; font-style: italic;
        }
        #rose-search:focus { width: 350px; background: rgba(255,255,255,0.4); backdrop-filter: blur(10px); }

        .window {
            width: 320px; position: absolute; top: 100px; left: 40px;
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.4);
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); z-index: 10;
        }

        /* --- CHAT DRAWER --- */
        #chat-drawer {
            position: absolute; right: -325px; top: 0; width: 320px; height: 100%;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(25px);
            border-left: 1px solid var(--rose-main); transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100;
            display: flex; flex-direction: column;
        }
        #chat-drawer.open { right: 0; }
        #chat-output { flex: 1; overflow-y: auto; padding: 20px; font-size: 0.95rem; display: flex; flex-direction: column; gap: 12px; }
        #chat-input { border: none; border-top: 1px solid var(--rose-light); padding: 20px; background: transparent; outline: none; font-family: 'Georgia'; font-style: italic; }

        /* --- FOOTER --- */
        #music-bar {
            position: absolute; bottom: 0; width: 100%; height: 50px;
            background: var(--glass); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center; gap: 30px; z-index: 10;
        }
        .toggle-chat { position: absolute; right: 20px; bottom: 70px; background: var(--rose-main); color: white; border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer; z-index: 10; font-family: 'Georgia'; }
    
    /* ... previous styles ... */
    #music-bar {
        position: absolute; bottom: 0; width: 100%; height: 60px;
        background: var(--glass); backdrop-filter: blur(20px);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 10; border-top: 1px solid rgba(255,255,255,0.2);
    }
    .controls { display: flex; align-items: center; gap: 40px; }
    .track-info { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
    .play-btn { background: none; border: none; cursor: pointer; color: var(--rose-dark); font-size: 1rem; transition: 0.3s; }
    .play-btn:hover { transform: scale(1.1); color: var(--rose-main); }
    
    /* A tiny progress bar for the aesthetic */
    #progress-container { width: 200px; height: 1px; background: rgba(109, 76, 76, 0.2); margin-top: 5px; }
    #progress-bar { width: 0%; height: 100%; background: var(--rose-main); transition: width 1s linear; }
    
    </style>
</head>
<body>
<audio id="rose-audio" style="display:none;"></audio>

    <div id="login-screen">
        <h3 style="font-weight: 300; letter-spacing: 3px; color: var(--rose-dark);">TRACE THE WORDS: ROSE, POEM, LOVE</h3>
        <div class="grid" id="game-grid"></div>
    </div>

    <div id="desktop">
        <div id="rain-layer"></div>
        <div id="petal-layer"></div>

        <div id="search-container">
            <input type="text" id="rose-search" placeholder="Type to wander..." onkeydown="if(event.key==='Enter') doSearch(this.value)">
        </div>

        <div class="window">
            <p id="quote-text" style="font-style: italic; margin-bottom: 8px;"></p>
            <p id="quote-author" style="text-align: right; font-size: 0.8rem; opacity: 0.7;"></p>
            <button onclick="alert('Added to your digital anthology.')" style="background:none; border:none; color:var(--rose-dark); cursor:pointer; font-size:0.75rem; padding:0;">❤ Bookmark</button>
        </div>

        <button class="toggle-chat" onclick="document.getElementById('chat-drawer').classList.toggle('open')">Speak with Rose</button>

        <div id="chat-drawer">
            <div style="padding: 25px 20px 10px 20px; font-weight: bold; letter-spacing: 2px; color: var(--rose-dark);">ROSE AI</div>
            <div id="chat-output">
                <p><i>The garden is open. What shall we discuss?</i></p>
            </div>
            <input type="text" id="chat-input" placeholder="Whisper 'Adieu' to part..." onkeydown="if(event.key==='Enter') handleChat(this.value)">
        </div>
<div id="music-bar">
    <div class="track-info" id="current-track">Velvet Harmony</div>
    <div class="controls">
        <button class="play-btn" onclick="prevTrack()">prev</button>
        <button class="play-btn" id="master-play" onclick="toggleMusic()">play</button>
        <button class="play-btn" onclick="nextTrack()">next</button>
    </div>
    <div id="progress-container"><div id="progress-bar"></div></div>
</div>
    <script>
        const targetWords = ["ROSE", "POEM", "LOVE"];
        let foundWords = [];
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // --- THE RESONANT CHIME (Replaces Theremin) ---
        function playChime() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(220, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 2);
        }

        // --- GRID LOGIC ---
        const rawGrid = ['A','B','C','D','E','F','G','H','I','J','K','R','T','Y','U','I','O','P','L','S','Q','W','O','R','T','Y','U','I','O','A','Z','X','C','S','V','B','N','M','V','D','F','G','H','J','E','K','L','P','E','O','I','U','Y','T','R','E','W','Q','A','S','P','O','E','M','L','K','J','H','G','F','D','S','A','Z','X','C','V','B','N','M','Q','W','E','R','T','Y','U','I','O','P','L','O','V','E','S','D','F','G','H','J'];
        const gridEl = document.getElementById('game-grid');
        rawGrid.forEach(l => {
            const div = document.createElement('div');
            div.className = 'cell'; div.innerText = l;
            div.onclick = () => { 
                if(audioCtx.state === 'suspended') audioCtx.resume();
                if(!div.classList.contains('found')) { div.classList.toggle('selected'); check(); } 
            };
            gridEl.appendChild(div);
        });

        function check() {
            const sel = Array.from(document.querySelectorAll('.cell.selected'));
            const word = sel.map(c => c.innerText).join('');
            const rev = word.split('').reverse().join('');
            targetWords.forEach(t => {
                if ((word === t || rev === t) && !foundWords.includes(t)) {
                    sel.forEach(c => { c.className = 'cell found'; });
                    foundWords.push(t);
                    playChime();
                    if (foundWords.length === 3) unlock();
                }
            });
        }

        function unlock() {
            setTimeout(() => {
                document.getElementById('login-screen').style.transform = "translateY(-100%)";
                document.getElementById('desktop').style.display = "block";
                initAtmosphere();
                document.getElementById('quote-text').innerText = '"Love looks not with the eyes, but with the mind."';
                document.getElementById('quote-author').innerText = '— Shakespeare';
            }, 800);
        }

        // --- CHAT DIALOGUE ---
        function handleChat(val) {
            const output = document.getElementById('chat-output');
            const input = document.getElementById('chat-input');
            const cleanVal = val.toLowerCase().trim();
            output.innerHTML += `<p style="color:var(--rose-main); align-self: flex-end;"><b>You:</b> ${val}</p>`;
            
            if (cleanVal === "adieu") {
                output.innerHTML += `<p><b>Rose:</b> <i>Until the next petal falls... Adieu.</i></p>`;
                setTimeout(() => { document.getElementById('chat-drawer').classList.remove('open'); input.value = ""; }, 1200);
                return;
            }

            let response = "How very romantic of you to say.";
            if(cleanVal.includes("hello")) response = "Greetings, wanderer.";
            if(cleanVal.includes("birthday")) response = "A beautiful milestone. May your day be dipped in chocolate.";
            if(cleanVal.includes("rose")) response = "The finest flower in the garden, and the heart of this world.";
            
            setTimeout(() => {
                output.innerHTML += `<p><b>Rose:</b> ${response}</p>`;
                output.scrollTop = output.scrollHeight;
            }, 600);
            input.value = "";
        }

        function initAtmosphere() {
            const rain = document.getElementById('rain-layer');
            const petals = document.getElementById('petal-layer');
            for(let i=0; i<35; i++){
                const drop = document.createElement('div'); drop.className = 'drop';
                drop.style.left = Math.random() * 100 + 'vw'; drop.style.animationDuration = (Math.random()*0.4+0.6)+'s';
                rain.appendChild(drop);
            }
            for(let i=0; i<12; i++){
                const p = document.createElement('div'); p.className = 'petal';
                p.style.left = Math.random() * 100 + 'vw'; p.style.width = p.style.height = (Math.random()*8+6)+'px';
                p.style.animationDuration = (Math.random()*7+7)+'s';
                petals.appendChild(p);
            }
        }

        function doSearch(val) {
            window.open(`https://www.google.com/search?q=${val}+romantic+rose+pink+ambience+chocolate`, '_blank');
        }
       
    // --- PLAYLIST LOGIC ---
    // Replace the old list with your actual file names
const playlist = [
    { name: "Unwind", src: "https://xencafe.nekoweb.org/2027/0JANUARY2027/TEMPLATES/ROSEOS/unwind0.mp3" },
    { name: "Steel Drum Reverie", src: "track2.mp3" }, 
    { name: "Midnight Petals", src: "track3.mp3" },
    { name: "Ethereal Rain", src: "track4.mp3" }
];
   
    let currentTrackIdx = 0;
    let isPlaying = false;
    let progressInterval;

   
function updatePlayer() {
    const track = playlist[currentTrackIdx];
    document.getElementById('current-track').innerText = track.name;
    audioPlayer.src = track.src; // This tells the OS to load unwind0.mp3
}

function toggleMusic() {
    const btn = document.getElementById('master-play');
    
    if (audioPlayer.paused) {
        audioPlayer.play();
        btn.innerText = "pause";
        startProgress(); // Visual bar starts moving
    } else {
        audioPlayer.pause();
        btn.innerText = "play";
        clearInterval(progressInterval);
    }
}

function nextTrack() {
    currentTrackIdx = (currentTrackIdx + 1) % playlist.length;
    updatePlayer();
    if (!audioPlayer.paused || btn.innerText === "pause") {
        audioPlayer.play();
    }
}

// Ensure the first track is loaded when the OS starts
window.onload = updatePlayer;
    function toggleMusic() {
        isPlaying = !isPlaying;
        const btn = document.getElementById('master-play');
        btn.innerText = isPlaying ? "pause" : "play";
        
        if (isPlaying) {
            startProgress();
        } else {
            clearInterval(progressInterval);
        }
    }

    function nextTrack() {
        currentTrackIdx = (currentTrackIdx + 1) % playlist.length;
        resetAndPlay();
    }

    function prevTrack() {
        currentTrackIdx = (currentTrackIdx - 1 + playlist.length) % playlist.length;
        resetAndPlay();
    }

    function resetAndPlay() {
        updatePlayer();
        if (isPlaying) startProgress();
    }

    function startProgress() {
        clearInterval(progressInterval);
        let width = 0;
        progressInterval = setInterval(() => {
            width += 1;
            document.getElementById('progress-bar').style.width = width + '%';
            if (width >= 100) {
                nextTrack(); // Auto-play next song
            }
        }, 1000); // Simulates a 100-second song for the vibe
    }

    </script>
</body>
</html>
