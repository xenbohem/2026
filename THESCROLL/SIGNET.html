<!DOCTYPE html>
<html lang="en">
<head><script src="/.nekoweb-api/static/site.js" type="text/javascript" defer></script>
<meta charset="UTF-8">
<title>Sealed Celestial Scroll</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Uncial+Antiqua&display=swap" rel="stylesheet">

<style>
/* ===== BACKGROUND STARS ===== */
body {
    margin: 0;
    background: black;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Cinzel', serif;
}

.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background:
        radial-gradient(2px 2px at 20% 30%, white, transparent),
        radial-gradient(2px 2px at 70% 80%, white, transparent),
        radial-gradient(1.5px 1.5px at 50% 60%, #cfd8ff, transparent),
        radial-gradient(2px 2px at 80% 20%, #ffffff, transparent),
        radial-gradient(1px 1px at 30% 70%, #b0c4ff, transparent);
    background-size: 400px 400px;
    animation: twinkle 6s infinite alternate ease-in-out;
}

@keyframes twinkle {
    0% { opacity: 0.6; }
    50% { opacity: 1; }
    100% { opacity: 0.7; }
}

/* ===== SCROLL ===== */
.scroll-wrapper {
    width: 750px;
    height: 80px;
    background: linear-gradient(#f6e6c8, #e8d3a3);
    position: relative;
    border-radius: 8px;
    overflow: visible;
    box-shadow: 0 0 60px rgba(0,0,0,0.9);
    transition: height 2s ease;
    z-index: 1;
}

.scroll-wrapper.open {
    height: 600px;
}

/* RODS */
.rod {
    position: absolute;
    left: -60px;
    right: -60px;
    height: 40px;
    background: linear-gradient(90deg, #c6a25e, #a47b35);
    border-radius: 50px;
}

.rod.top { top: -20px; }
.rod.bottom { bottom: -20px; }

/* ===== CRYSTALS ===== */
.crystal {
    position: absolute;
    width: 55px;
    height: 55px;
    clip-path: polygon(
        50% 0%, 85% 20%, 100% 50%, 85% 80%,
        50% 100%, 15% 80%, 0% 50%, 15% 20%
    );
    background: linear-gradient(135deg,#7f5af0,#a855f7,#9b5de5,#5f9cff);
    box-shadow: 0 0 15px #7f5af0;
    transition: all 0.6s ease;
    cursor: pointer;
}

.crystal:hover {
    box-shadow: 0 0 35px #a855f7, 0 0 60px #5f9cff;
    transform: scale(1.05);
}

.crystal.active {
    animation: crystalPulse 0.8s ease;
}

@keyframes crystalPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); box-shadow: 0 0 60px #c084fc; }
    100% { transform: scale(1); }
}

.crystal.top-left { top: -48px; left: -85px; }
.crystal.top-right { top: -48px; right: -85px; }
.crystal.bottom-left { bottom: -48px; left: -85px; }
.crystal.bottom-right { bottom: -48px; right: -85px; }

/* ===== STAR PARTICLES ===== */
.star-particle {
    position: fixed;
    color: white;
    font-size: 10px;
    pointer-events: none;
    animation: fallStar 2.5s linear forwards;
}

@keyframes fallStar {
    0% { opacity: 1; transform: translateY(0px) scale(1); }
    100% { opacity: 0; transform: translateY(150px) scale(0.5); }
}

/* ===== CENTER SEAL ===== */
.seal {
    position: absolute;
    width: 120px;
    height: 120px;
    background: radial-gradient(circle at 30% 30%, #9b0000, #5a0000);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 25px crimson;
    display: flex;
    justify-content: center;
    align-items: center;
    color: gold;
    font-weight: bold;
    cursor: pointer;
    transition: 0.5s;
    z-index: 5;
    font-size: 50px;
}

.seal.broken {
    animation: shatter 1s forwards;
}

@keyframes shatter {
    0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(0.2) rotate(720deg); opacity: 0; }
}

/* ===== SOFT LIGHT MIST ===== */
.light-beam {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 100%;
    background: radial-gradient(
        ellipse at center,
        rgba(255,255,255,0.25),
        rgba(200,220,255,0.15),
        transparent 70%
    );
    opacity: 0;
    pointer-events: none;
    filter: blur(30px);
    z-index: 2;
}

.light-beam.active {
    animation: divineFade 3s ease forwards;
}

@keyframes divineFade {
    0% { opacity: 0; }
    20% { opacity: 0.8; }
    60% { opacity: 0.5; }
    100% { opacity: 0; }
}

/* ===== MODAL ===== */
.modal {
    position: fixed;
    background: rgba(0,0,0,0.9);
    color: white;
    padding: 30px;
    border-radius: 10px;
    display: none;
    flex-direction: column;
    align-items: center;
    z-index: 10;
}

.modal input {
    padding: 10px;
    margin-top: 15px;
    font-size: 16px;
}

.modal button {
    margin-top: 10px;
    padding: 8px 15px;
    cursor: pointer;
}

/* ===== SCROLL CONTENT ===== */
.scroll-content {
    opacity: 0;
    padding: 80px 60px 60px;
    transition: opacity 1.5s ease;
}

.scroll-wrapper.open .scroll-content {
    opacity: 1;
}

h1 {
    font-family: 'Uncial Antiqua', cursive;
    text-align: center;
    color: #5b2e0f;
}

nav {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin: 40px 0;
}

nav a {
    text-decoration: none;
    font-weight: bold;
    color: #3b220d;
}

nav a:hover {
    color: #9b5de5;
    text-shadow: 0 0 12px #5f9cff;
}

.section {
    display: none;
    font-size: 18px;
}

.section.active {
    display: block;
}
</style>
</head>
<body>

<div class="stars"></div>
<div class="light-beam" id="lightBeam"></div>

<div class="scroll-wrapper" id="scroll">

    <div class="rod top"></div>
    <div class="rod bottom"></div>

    <div class="crystal top-left"></div>
    <div class="crystal top-right"></div>
    <div class="crystal bottom-left"></div>
    <div class="crystal bottom-right"></div>

    <div class="seal" id="seal">♱</div>

    <div class="scroll-content">
        <h1>The Sealed Chronicle</h1>
        <nav>
            <a href="#" onclick="showSection('about')">ABOUT</a>
            <a href="#" onclick="showSection('mission')">MISSION</a>
            <a href="#" onclick="showSection('poems')">POEMS</a>
            <a href="#" onclick="showSection('social')">SOCIAL</a>
        </nav>
        <div id="about" class="section active">
            A sacred manuscript beneath starfire.
        </div>
        <div id="mission" class="section">
            To merge ancient scrollwork and cosmic light.
        </div>
        <div id="poems" class="section">
            Verses shimmer like constellations.
        </div>
        <div id="social" class="section">
            Fellowship beneath a glittering sky.
        </div>
    </div>

</div>

<div class="modal" id="modal">
    <h2>Riddle</h2>
    <p>Who alone is worthy to break the seals in Revelation?</p>
    <input type="text" id="answer" placeholder="Your answer...">
    <button onclick="checkAnswer()">Submit</button>
</div>

<script>
const seal = document.getElementById('seal');
const modal = document.getElementById('modal');
const scroll = document.getElementById('scroll');
const lightBeam = document.getElementById('lightBeam');

seal.onclick = () => { modal.style.display = "flex"; };

function checkAnswer() {
    const value = document.getElementById('answer').value.toLowerCase().trim();
    const accepted = ["yeshua","jesus christ","the lamb of god","jesus","the lamb"];
    if (accepted.includes(value)) {
        modal.style.display = "none";
        lightBeam.classList.add("active");

        const whisper = new Audio("Revelationfive.mp3");
        whisper.volume = 0.25;
        whisper.play();

        seal.classList.add("broken");

        setTimeout(() => { scroll.classList.add("open"); }, 900);
    } else {
        alert("The seal remains unbroken.");
    }
}

function showSection(id) {
    document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
// ===== CRYSTAL INTERACTIVITY (with toggle close) =====
const crystals = document.querySelectorAll('.crystal');
crystals.forEach(crystal => {
    crystal.addEventListener('click', () => {

        // If scroll is open → close it
        if (scroll.classList.contains('open')) {
            closeScroll();
            return;  // stop further click effects
        }

        // Otherwise, do regular interactive effects
        crystal.classList.add('active');
        setTimeout(() => { crystal.classList.remove('active'); }, 800);

        for (let i = 0; i < 8; i++) {
            const star = document.createElement('div');
            star.classList.add('star-particle');
            star.innerHTML = "✦";
            const rect = crystal.getBoundingClientRect();
            star.style.left = rect.left + rect.width / 2 + (Math.random() * 20 - 10) + "px";
            star.style.top = rect.top + rect.height / 2 + "px";
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 2500);
        }
        function closeScroll() {
    // collapse scroll
    scroll.classList.remove('open');

    // reset seal
    seal.classList.remove('broken');
    seal.style.opacity = "1";

    // optionally clear input
    document.getElementById('answer').value = "";

    // bring seal back to center
    modal.style.display = "none";

    // you can also fade out any current content
    document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
    document.getElementById('about').classList.add('active');
}
    });

});
</script>

</body>
</html>
