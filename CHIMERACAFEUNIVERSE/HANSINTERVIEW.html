<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hans' Library</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet"><style>
body {
  margin:0;
  overflow:hidden;
  background:#02030a;
  font-family:Georgia;
  color:white;
}

/* star canvas */
canvas {
  position:absolute;
  top:0;
  left:0;
}
  /* title */
.title{
position:absolute;
top:15%;
width:100%;
text-align:center;
font-family:'UnifrakturCook';
font-size:42px;
color:#7da2ff;
letter-spacing:3px;
}

/* dialogue panel */
#panel {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:600px;
  padding:40px;
  background:rgba(10,10,40,.9);
  border:2px solid #7da2ff;
  box-shadow:0 0 30px rgba(120,150,255,.25);
  text-align:left;
}

/* avatar */
#avatar {
  width:120px;
  float:left;
  margin-right:20px;
}

/* dialogue text */
#dialogue {
  font-size:16px;
  line-height:1.6;
}

/* buttons */
button {
  margin-top:18px;
  padding:10px 16px;
  background:#0b0b30;
  border:1px solid #7da2ff;
  color:#7da2ff;
  cursor:pointer;
}
button:hover {
  background:#7da2ff;
  color:black;
}
.choice {
  display:block;
  margin-top:12px;
}
</style>
</head>

<body>

<div id="title">Hans' Library</div>
<canvas id="stars"></canvas>

<div id="panel">
  <img id="avatar" src="https://xencafe.nekoweb.org/ARCHIVE-LIBRARY/GALAXYNAVIGATOR/hanz.jpeg">
  <div id="dialogue"></div>
  <div id="choices"></div>
</div>

<script>
/* starfield */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let stars = [];
for (let i=0;i<250;i++){
  stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, size:Math.random()*2, tw:Math.random()*5});
}
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    let glow = Math.sin(Date.now()*0.002+s.tw)*0.5+0.5;
    ctx.fillStyle="rgba(255,255,255,"+glow+")";
    ctx.fillRect(s.x,s.y,s.size,s.size);
  });
  requestAnimationFrame(drawStars);
}
drawStars();

/* PLAYER MEMORY */
let playerName="Traveler";

startIntro();

/* INTRO */
function startIntro(){
  dialogue.innerHTML = `<b>Hans</b><br><br>
  Welcome, traveler.<br><br>
  You have crossed a rather curious threshold.<br>
  Before we proceed, what shall we call you?`;

  choices.innerHTML = `
    <input id="nameInput" placeholder="Your name">
    <br>
    <button onclick="saveName()">Continue</button>
  `;
}

/* SAVE NAME */
function saveName(){
  let n = document.getElementById("nameInput").value;
  if(n.length>0) playerName=n;
  intro2();
}

/* INTRO PART 2 */
function intro2(){
  dialogue.innerHTML = `<b>Hans</b><br><br>
  Excellent, ${playerName}.<br><br>
  The Chimera Parallel Universe contains many realms.<br>
  Each one teaches something different.<br><br>
  To guide you properly, I must ask you a question.`;

  choices.innerHTML = `<button onclick="question1()">Begin Interview</button>`;
}

/* QUESTION 1 */
function question1(){
  dialogue.innerHTML = `<b>Hans</b><br><br>
  Tell me, ${playerName}…<br><br>
  What kind of discovery appeals to you most?`;

  choices.innerHTML = `
    <button class="choice" onclick="choose('cafe')">Creative arts and making things</button>
    <button class="choice" onclick="choose('garden')">Plants, herbs, and gardens</button>
    <button class="choice" onclick="choose('music')">Music and sound</button>
    <button class="choice" onclick="choose('study')">Reading and study</button>
    <button class="choice" onclick="choose('talk')">Conversation and thoughtful people</button>
  `;
}

/* RESULT CHOICES WITH TEMP LINKS */
function choose(type){
  let realmTitle="", desc="", tempLink="";
  if(type=="cafe"){ realmTitle="Star's Cosmic Cafe"; desc="A place where drinks are crafted and travelers gather."; tempLink="cafe.html"; }
  if(type=="garden"){ realmTitle="Milo's Herb Garden"; desc="A peaceful garden of herbs and natural wisdom."; tempLink="garden.html"; }
  if(type=="music"){ realmTitle="Miki's Music Studio"; desc="A world of melody and rhythm."; tempLink="music.html"; }
  if(type=="study"){ realmTitle="Sanctuary Studies"; desc="A quiet library of reflection and books."; tempLink="study.html"; }
  if(type=="talk"){ realmTitle="Chari's Corner"; desc="A gentle place for thoughtful conversation."; tempLink="talk.html"; }

  dialogue.innerHTML = `<b>Hans</b><br><br>
    Excellent, ${playerName}.<br><br>
    You are perfectly suited for:<br>
    <h3>${realmTitle}</h3>
    ${desc}
  `;

  choices.innerHTML = `<button onclick="enterRealm('${tempLink}')">Enter Realm</button>`;
}

/* ENTER REALM */
function enterRealm(link){
  window.location.href = link; // temporary link
}
</script>

</body>
</html>
