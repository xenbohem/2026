
<!DOCTYPE html>
<html>
<head><script src="/.nekoweb-api/static/site.js" defer></script>
<meta charset="UTF-8">
<title>Chimera Parallel Universe</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#04040d;
color:white;
font-family:Courier New;
overflow:hidden;
}

/* cosmic stars */

body::before{
content:"";
position:fixed;
width:300%;
height:300%;
background:
radial-gradient(white 1px, transparent 1px),
radial-gradient(#88aaff 1px, transparent 1px),
radial-gradient(#ff88ff 1px, transparent 1px);
background-size:80px 80px,140px 140px,200px 200px;
animation:stars 180s linear infinite;
opacity:.4;
}

@keyframes stars{
from{transform:translate(0,0);}
to{transform:translate(-1200px,-900px);}
}

/* title */

.title{
position:absolute;
top:15%;
width:100%;
text-align:center;
font-family:'UnifrakturCook';
font-size:42px;
color:#7da2ff;
letter-spacing:3px;
}

/* entry portal */

.avatar{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:120px;
height:120px;
border-radius:50%;
background:radial-gradient(circle,#fff,#7da2ff,#1a1a50);
box-shadow:0 0 30px #7da2ff;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
transition:.4s;
}

.avatar:hover{
transform:translate(-50%,-50%) scale(1.2);
}

/* dialogue */

.dialogue{
position:absolute;
bottom:50px;
left:50%;
transform:translateX(-50%);
width:600px;
background:rgba(20,20,50,.9);
border:2px solid #7da2ff;
padding:20px;
display:none;
}

.character{
font-weight:bold;
color:#7da2ff;
margin-bottom:10px;
}

/* portrait */

.portrait{
float:left;
width:80px;
height:80px;
background:#333;
margin-right:15px;
border:2px solid #7da2ff;
}

/* buttons */

button{
margin-top:10px;
padding:8px 16px;
background:#7da2ff;
border:none;
cursor:pointer;
}

input{
padding:6px;
}

.reset{
position:absolute;
bottom:10px;
right:10px;
}

</style>
</head>

<body>

<div class="title">
Chimera Parallel Universe
</div>

<div class="avatar" onclick="startStory()">
✨
</div>

<div class="dialogue" id="dialogueBox">

<img class="portrait" id="portrait" src="https://xencafe.nekoweb.org/ARCHIVE-LIBRARY/GALAXYNAVIGATOR/hanz.jpeg">
<div class="character">
Hans
</div>

<div id="text"></div>

<div id="inputArea"></div>

<div style="clear:both;"></div>

</div>

<button class="reset" onclick="resetGame()">Reset Adventure</button>

<script>

/* PLAYER SAVE SYSTEM */

let player = JSON.parse(localStorage.getItem("chimeraPlayerData")) || {
name:null,
apprenticeship:null,
progress:[]
}

function savePlayer(){
localStorage.setItem("chimeraPlayerData", JSON.stringify(player))
}

/* STORY START */

function startStory(){

document.querySelector(".avatar").style.display="none"
document.getElementById("dialogueBox").style.display="block"

if(player.name){

text.innerHTML =
"Welcome back <b>"+player.name+"</b>. The Chimera Universe remembers you."

nextButton(intro2)

}else{

text.innerHTML =
"Greetings traveler. My name is Hans.<br><br>What shall we call you?"

inputArea.innerHTML =
'<input id="nameInput" placeholder="Your name"><br><button onclick="saveName()">Continue</button>'

}

}

/* SAVE NAME */

function saveName(){

player.name = document.getElementById("nameInput").value
savePlayer()

inputArea.innerHTML=""

text.innerHTML =
"A wonderful name.<br><br>Welcome "+player.name+"."

nextButton(intro2)

}

/* INTRO STORY */

function intro2(){

text.innerHTML =
"You have entered a universe unlike anything you have encountered before."

nextButton(intro3)

}

function intro3(){

text.innerHTML =
"Within this world are cafés, libraries, gardens, music halls, and mysteries."

nextButton(startQuiz)

}

/* QUIZ */

function startQuiz(){

text.innerHTML =
"Tell me, "+player.name+"... which calls to you most?"

inputArea.innerHTML = `

<button onclick="resultCafe()">☕ Tea and conversation</button><br><br>

<button onclick="resultGarden()">🌿 Herbs and gardens</button><br><br>

<button onclick="resultMusic()">🎵 Music and creativity</button><br><br>

<button onclick="resultTalk()">💬 Quiet thoughtful conversation</button>

`

}

function resultCafe(){
player.apprenticeship="Cafe Apprentice"
savePlayer()
showResult("Cafe Apprentice","cafe.html")
}

function resultGarden(){
player.apprenticeship="Herbalist Apprentice"
savePlayer()
showResult("Herb Garden","garden.html")
}

function resultMusic(){
player.apprenticeship="Music Apprentice"
savePlayer()
showResult("Music Hall","music.html")
}

function resultTalk(){
player.apprenticeship="Conversation Apprentice"
savePlayer()
showResult("Chari's Conversation Room","chari.html")
}

/* RESULT */

function showResult(place,url){

inputArea.innerHTML=""

text.innerHTML =
"Excellent, "+player.name+".<br><br>You are perfectly suited for <b>"+place+"</b>."

nextButton(()=>openRealm(url))

}

<h3>${realmTitle}</h3>

${desc}

`

choices.innerHTML=`

<button onclick="enterRealm()">
View the realm
</button>

`

}



/* ENTER REALM */

function enterRealm(link){

window.location.href=link

}


  
/* PORTAL */

function openRealm(url){

playPortalSound()

setTimeout(()=>{

if(url.startsWith("#")){

alert("🚧 This realm is still forming in the universe...")

}else{

window.open(url,"_blank")

}

},400)


}

/* SYNTH PORTAL SOUND */

function playPortalSound(){

const ctx = new (window.AudioContext||window.webkitAudioContext)()

const osc = ctx.createOscillator()
const gain = ctx.createGain()

osc.type="sine"
osc.frequency.value=440

osc.connect(gain)
gain.connect(ctx.destination)

gain.gain.value=.15

osc.start()

osc.frequency.exponentialRampToValueAtTime(660,ctx.currentTime+.4)
gain.gain.exponentialRampToValueAtTime(.01,ctx.currentTime+.4)

osc.stop(ctx.currentTime+.4)

}

/* RESET */

function resetGame(){
localStorage.removeItem("chimeraPlayerData")
location.reload()
}

/* NEXT BUTTON */

function nextButton(func){
inputArea.innerHTML =
'<button onclick="'+func.name+'()">Continue</button>'
}

</script>

</body>
</html>
