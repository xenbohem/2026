<!DOCTYPE html> 

<html>
<head>
<meta charset="UTF-8">
<title>Punk Pirate TV</title>

<style>

body{
margin:0;
font-family:monospace;
color:#00ff66;

background:
radial-gradient(circle at 20% 30%, #222 0%, black 60%),
repeating-linear-gradient(45deg,
rgba(255,0,80,.08),
rgba(255,0,80,.08) 4px,
transparent 4px,
transparent 8px);

height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* COLLAGE */

.collage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

.note{

position:absolute;
width:220px;
background:#eee;
padding:8px;

clip-path:polygon(
2% 6%, 10% 0%, 92% 3%, 99% 9%,
97% 93%, 88% 100%, 8% 96%, 1% 90%
);

box-shadow:0 10px 20px rgba(0,0,0,.6);

animation:
drift 6s infinite alternate ease-in-out,
flicker 12s infinite;

pointer-events:auto;
cursor:pointer;

}

.note img{
width:100%;
display:block;
}

/* tape */

.tape{
position:absolute;
width:70px;
height:22px;
background:linear-gradient(
rgba(255,255,255,.8),
rgba(255,255,255,.4)
);
box-shadow:0 2px 6px rgba(0,0,0,.4);
}

.t1{
top:-12px;
left:70px;
transform:rotate(-8deg);
}

.t2{
bottom:-10px;
right:40px;
transform:rotate(12deg);
}

/* floating */

@keyframes drift{
0%{transform:translateY(0px)}
100%{transform:translateY(-8px)}
}

/* flicker */

@keyframes flicker{

0%{opacity:1}
96%{opacity:1}
97%{opacity:.5}
98%{opacity:1}
99%{opacity:.2}
100%{opacity:1}

}

/* MAIN UI */

.wrapper{
display:flex;
gap:40px;
position:relative;
z-index:10;
}

/* CHANNEL LIST */

.sidebar{
width:220px;
}

.channel{
display:block;
padding:6px;
margin:6px 0;
background:#111;
border-left:5px solid #ff0055;
cursor:pointer;
transform:rotate(-1deg);
}

.channel:hover{
background:#003300;
}

/* CRT */

.tv{

width:620px;
height:360px;

background:black;
border:8px solid #111;

position:relative;
overflow:hidden;

transform:rotate(-2deg) skewX(-1deg);

box-shadow:
0 0 10px #ff0055,
0 0 30px #00ff66;

animation:tvWobble 4s infinite alternate;

}

@keyframes tvWobble{

0%{transform:rotate(-2deg)}
50%{transform:rotate(-1deg)}
100%{transform:rotate(-3deg)}

}

video,iframe{
width:100%;
height:100%;
border:none;
}

/* scanline */

.scan{
position:absolute;
width:100%;
height:4px;
background:rgba(255,255,255,.1);
animation:scan 8s linear infinite;
}

@keyframes scan{
0%{top:-5%}
100%{top:105%}
}

/* static */

.static{
position:absolute;
width:100%;
height:100%;
background:repeating-linear-gradient(
0deg,
rgba(255,255,255,.2),
rgba(255,255,255,.2) 2px,
transparent 2px,
transparent 4px
);
display:none;
}

.power{
margin-top:12px;
padding:8px 18px;
border:2px solid #00ff66;
background:black;
color:#00ff66;
cursor:pointer;
}

</style>

</head>

<body>

<audio id="powerSound" src="power_on.mp3"></audio> <audio id="staticSound" src="static.mp3"></audio>

<!-- COLLAGE -->

<div class="collage">

<div class="note" data-secret="https://example.com">
<img src="image1.jpg">
<div class="tape t1"></div>
<div class="tape t2"></div>
</div>

<div class="note" data-secret="https://example.com">
<img src="image2.jpg">
<div class="tape t1"></div>
<div class="tape t2"></div>
</div>

<div class="note" data-secret="https://example.com">
<img src="image3.jpg">
<div class="tape t1"></div>
<div class="tape t2"></div>
</div>

</div>

<!-- UI -->

<div class="wrapper">

<div class="sidebar">

<h2>PIRATE TV</h2>

<div class="channel" data-type="video" data-src="intro.mp4">01 INTRO</div>
<div class="channel" data-type="iframe" data-src="https://xenbohem.github.io/2026/archive/movie/index.html">02 MOVIES</div>
<div class="channel" data-type="iframe" data-src="https://xenbohem.github.io/twasforetold/visualizer/dream_visualizer_playlist.html">03 DREAM</div>
<div class="channel" data-type="iframe" data-src="https://xencafe.nekoweb.org/2026/QUEST.MANIFEST/original#">04 QUEST</div>

</div>

<div>

<div class="tv">

<video id="screen" autoplay loop muted playsinline></video>

<div class="scan"></div>
<div class="static" id="static"></div>

</div>

<button class="power" id="power">POWER</button>

</div>

</div>

<script>

/* RANDOM NOTE PLACEMENT */

document.querySelectorAll(".note").forEach(note=>{

note.style.top=Math.random()*80+"%"
note.style.left=Math.random()*80+"%"

let rot=(Math.random()*20)-10
let scale=.8+Math.random()*.4

note.style.transform=
"rotate("+rot+"deg) scale("+scale+")"

let duration=4+Math.random()*6
note.style.animationDuration=duration+"s"

})

/* MOUSE PARALLAX */

document.addEventListener("mousemove",e=>{

let x=(e.clientX/window.innerWidth-.5)*20
let y=(e.clientY/window.innerHeight-.5)*20

document.querySelectorAll(".note").forEach(n=>{

n.style.transform+=" translate("+x+"px,"+y+"px)"

})

})

/* OCCASIONAL PAPER SHIFT */

setInterval(()=>{

let notes=document.querySelectorAll(".note")
let n=notes[Math.floor(Math.random()*notes.length)]

n.style.transform+=" rotate(20deg)"

setTimeout(()=>{
location.reload()
},800)

},9000)

/* SECRET NOTE CHANNELS */

document.querySelectorAll(".note").forEach(note=>{

note.onclick=()=>{

if(!tvOn) return

loadChannel("iframe",note.dataset.secret)

}

})

/* POWER */

let tvOn=false

const power=document.getElementById("power")
const powerSound=document.getElementById("powerSound")

power.onclick=()=>{

tvOn=!tvOn

powerSound.currentTime=0
powerSound.play()

}

/* CHANNELS */

const channels=document.querySelectorAll(".channel")
const staticEl=document.getElementById("static")
const staticSound=document.getElementById("staticSound")

function flashStatic(){

staticEl.style.display="block"

staticSound.currentTime=0
staticSound.play()

setTimeout(()=>{

staticEl.style.display="none"

},120)

}

function loadChannel(type,src){

flashStatic()

const old=document.getElementById("screen")

let el

if(type==="video"){

el=document.createElement("video")

el.src=src
el.autoplay=true
el.loop=true
el.volume=1

}else{

el=document.createElement("iframe")

el.src=src

}

el.id="screen"

old.replaceWith(el)

}

channels.forEach((c,i)=>{

c.onclick=()=>{

if(!tvOn) return

loadChannel(c.dataset.type,c.dataset.src)

}

})

</script>

</body>
</html>
