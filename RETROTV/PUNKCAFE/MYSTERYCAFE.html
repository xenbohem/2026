<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pirate TV</title>

<style>

body{
margin:0;
background:#0a0a0a;
font-family:monospace;
overflow:hidden;
color:#00ff99;
}

/* CHANNEL LIST */

#channels{
position:fixed;
left:20px;
top:50%;
transform:translateY(-50%);
z-index:10;
}

#channels a{
display:block;
color:#00ff99;
text-decoration:none;
margin:6px 0;
font-size:14px;
}

#channels a:hover{
color:#fff;
}

/* TV */

#tv{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-3deg);
width:720px;
height:420px;
background:#000;
border:14px solid #111;
box-shadow:0 0 80px #000;
overflow:hidden;
}

#screen{
width:100%;
height:100%;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* POWER BUTTON */

#power{
position:absolute;
bottom:10px;
right:10px;
background:#111;
color:#0f0;
border:none;
padding:6px 10px;
cursor:pointer;
}

/* FLOATING NOTES */

.note{

position:absolute;
width:180px;
height:140px;

background:#fff;

overflow:hidden;

clip-path: polygon(
2% 6%, 10% 0%, 92% 3%, 99% 9%,
97% 93%, 88% 100%, 8% 96%, 1% 90%
);

box-shadow:0 6px 18px rgba(0,0,0,.6);

animation:drift 8s infinite alternate ease-in-out;

}

/* NOTE IMAGE */

.note img{

width:100%;
height:100%;
object-fit:cover;

}

/* TAPE */

.tape{

position:absolute;
width:60px;
height:16px;

background:rgba(255,255,200,.7);

top:-10px;
left:60px;

transform:rotate(-6deg);

}

/* FLOAT MOTION */

@keyframes drift{

0%{transform:translateY(-6px)}
100%{transform:translateY(6px)}

}

/* FADE IN */

.fadein{

animation:fade .8s forwards;

}

@keyframes fade{

from{opacity:0}
to{opacity:1}

}

</style>
</head>

<body>

<!-- CHANNEL LINKS -->

<div id="channels">

<a onclick="changeChannel('video1.mp4')">ART</a>
<a onclick="changeChannel('video2.mp4')">CATS</a>
<a onclick="changeChannel('video3.mp4')">DIY</a>
<a onclick="changeChannel('video4.mp4')">MUSIC</a>

</div>

<!-- TV -->

<div id="tv">

<div id="screen">
<video id="player" autoplay loop controls></video>
</div>

<button id="power">POWER</button>

</div>

<!-- AUDIO -->

<audio id="powerSound"
src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6c3c0d7c62.mp3?filename=retro-click-23667.mp3"></audio>

<script>

/* VIDEO */

function changeChannel(src){

let v=document.getElementById("player")

v.src=src
v.play()

}

/* POWER BUTTON */

let on=true

document.getElementById("power").onclick=()=>{

let tv=document.getElementById("tv")
let sound=document.getElementById("powerSound")

sound.currentTime=0
sound.play()

on=!on

tv.style.opacity=on?1:0

}

/* NOTE IMAGES */

let notesData=[

{
img:"https://picsum.photos/300?1",
type:"link",
value:"https://wikipedia.org"
},

{
img:"https://picsum.photos/300?2",
type:"channel",
value:"video2.mp4"
},

{
img:"https://picsum.photos/300?3",
type:"text",
value:"The signal repeats every night."
},

{
img:"https://picsum.photos/300?4",
type:"sound",
value:"https://cdn.pixabay.com/download/audio/2022/03/15/audio_6c3c0d7c62.mp3"
},

{
img:"https://picsum.photos/300?5",
type:"image",
value:"https://picsum.photos/800"
}

]

/* CREATE NOTE */
function createNote(){

let data=notesData[Math.floor(Math.random()*notesData.length)]

let note=document.createElement("div")
note.className="note fadein"

let img=document.createElement("img")
img.src=data.img

let tape=document.createElement("div")
tape.className="tape"

note.appendChild(img)
note.appendChild(tape)

/* RANDOM POSITION */

note.style.top=Math.random()*85+"%"
note.style.left=Math.random()*85+"%"

let rot=(Math.random()*20)-10
let scale=.8+Math.random()*.5

note.style.transform="rotate("+rot+"deg) scale("+scale+")"

let speed=5+Math.random()*10
note.style.animationDuration=speed+"s"

/* CLICK BEHAVIOR */

note.onclick=()=>handlePortal(data)

document.body.appendChild(note)


}

/* INITIAL NOTES */

for(let i=0;i<6;i++){

createNote()

}

/* ADD NOTES OVER TIME */

setInterval(()=>{

createNote()

},5000)
function handlePortal(data){

if(data.type==="link"){

window.open(data.value,"_blank")

}

else if(data.type==="channel"){

changeChannel(data.value)

}

else if(data.type==="text"){

alert(data.value)

}

else if(data.type==="sound"){

let s=new Audio(data.value)
s.play()

}

else if(data.type==="image"){

let w=window.open("")
w.document.write("<img src='"+data.value+"' style='width:100%'>")

}

}
</script>

</body>
</html>
