<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spider Archive</title>

<style>
:root{
 --pink:#ff4da6;
 --purple:#3d1b6a;
 --black:#0e0e0e;
 --charcoal:#181818;
 --soft:#aaaaaa;
}
body{
 margin:0;
 background:var(--black);
 font-family:"Courier New",monospace;
 color:white;
 overflow:hidden;
}
.wrapper{
 display:grid;
 grid-template-columns:420px 1fr;
 height:100vh;
}
.sidebar{
 background:var(--charcoal);
 padding:20px;
 overflow-y:auto;
 border-right:1px solid var(--purple);
 position:relative;
}
h1{
 font-size:14px;
 letter-spacing:3px;
 color:var(--pink);
}
.controls{
 margin:10px 0;
 display:flex;
 flex-wrap:wrap;
 gap:6px;
}
input, select, button{
 background:black;
 border:1px solid var(--purple);
 color:var(--pink);
 padding:6px;
 font-size:11px;
}
button:hover{
 border-color:var(--pink);
 cursor:pointer;
}
.az-nav{
 display:flex;
 flex-wrap:wrap;
 gap:4px;
 margin-bottom:10px;
}
.az-nav span{
 font-size:10px;
 color:var(--soft);
 cursor:pointer;
}
.az-nav span:hover{
 color:var(--pink);
}
.tile{
 border:1px solid var(--purple);
 margin-bottom:12px;
 background:black;
 transition:.25s ease;
}
.tile:hover{
 border-color:var(--pink);
}
.tile img{
 width:100%;
 height:140px;
 object-fit:cover;
 filter:grayscale(30%);
}
.title{
 font-size:11px;
 padding:6px;
 color:var(--pink);
}
.badges{
 padding:0 6px 6px 6px;
 display:flex;
 flex-wrap:wrap;
 gap:4px;
}
.badge{
 font-size:9px;
 border:1px solid var(--purple);
 padding:2px 4px;
 color:var(--soft);
}
.commentary{
 font-size:9px;
 padding:6px;
 color:var(--soft);
 border-top:1px solid #222;
 display:none;
}
.viewer{
 background:black;
}
iframe{
 width:100%;
 height:100%;
 border:none;
}
#spider{
 position:absolute;
 width:28px;
 font-size:22px;
 animation:crawl 25s linear infinite;
 z-index:9999;
}
@keyframes crawl{
 0%{top:0; left:0;}
 25%{top:0; left:92%;}
 50%{top:92%; left:92%;}
 75%{top:92%; left:0;}
 100%{top:0; left:0;}
}

/* subtle corner webs */
.web{
 position:absolute;
 width:120px;
 opacity:.07;
 pointer-events:none;
}
.web.top-left{top:0;left:0;}
.web.bottom-right{bottom:0;right:0;transform:rotate(180deg);}
</style>
</head>

<body>

<div class="wrapper">

<div class="sidebar">

<h1>SPIDER ARCHIVE</h1>

<div class="controls">
<input type="text" id="search" placeholder="Search...">
<select id="tagFilter">
<option value="all">All</option>
<option value="cafe">Cafe</option>
<option value="adventure">Adventure</option>
<option value="chat">Chat</option>
<option value="guild">Guild</option>
<option value="menu">Menu</option>
<option value="membership">Membership</option>
</select>
<button onclick="scanAllPages()">Scan</button>
<button onclick="toggleCommentary()">Commentary</button>
</div>

<div class="az-nav" id="azNav"></div>
<div id="grid"></div>

<img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Spider_web_icon.svg" class="web top-left">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Spider_web_icon.svg" class="web bottom-right">

</div>

<div class="viewer">
<iframe name="viewer"></iframe>
</div>

</div>

<div id="spider">🕷</div>

<script>

const urls = [
"https://3society.neocities.org/GUILD.AUGUST/TRIO.CHATCAFE/triochat",
"https://3society.neocities.org/GUILD.AUGUST/GUILD.REFRESHED/TEASHOP.game/cashier",
"https://3society.neocities.org/00JAN31-2026/videogame",
"https://3society.neocities.org/00January.forum/002"
];

const characters = ["stellar","star","milo","chimi","hans"];

const keywordMap = {
 cafe:["cafe","coffee","tea","shop"],
 adventure:["quest","adventure","game"],
 chat:["chat","realm","bot","trio"],
 guild:["guild","library","music"],
 menu:["menu","navigation","gateway"],
 membership:["join","signup","member"]
};

let commentaryMode=false;

function scanAllPages(){

 const results=[];

 urls.forEach(url=>{

  const lower=url.toLowerCase();
  const rawTitle=url.split("/").filter(Boolean).pop();
  const cleanTitle=rawTitle.replace(/[-._]/g," ");

  let tags=[];
  for(const tag in keywordMap){
   if(keywordMap[tag].some(word=>lower.includes(word))){
    tags.push(tag);
   }
  }

  const charHits=characters.filter(c=>lower.includes(c));

  const keywords=[...new Set([...tags,...charHits])];

  results.push({
   url,
   title:cleanTitle,
   tags,
   charHits,
   keywords
  });
 });

 localStorage.setItem("archiveData",JSON.stringify(results));
 buildArchive(results);
 buildAZ(results);
}

function buildArchive(items){

 const grid=document.getElementById("grid");
 grid.innerHTML="";

 items.sort((a,b)=>a.title.localeCompare(b.title));

 items.forEach(item=>{

  const tile=document.createElement("div");
  tile.className="tile";
  tile.dataset.tags=item.tags.join(",");
  tile.dataset.title=item.title.toLowerCase();
  tile.dataset.keywords=item.keywords.join(",");

  tile.innerHTML=`
  <a href="${item.url}" target="viewer">
   <img src="https://image.thum.io/get/width/400/${item.url}">
  </a>
  <div class="title">${item.title}</div>
  <div class="badges">
   ${item.keywords.map(k=>`<div class="badge">${k}</div>`).join("")}
  </div>
  <div class="commentary">
   URL: ${item.url}<br>
   Tags: ${item.tags.join(", ")}<br>
   Characters: ${item.charHits.join(", ") || "None"}
  </div>
  `;

  grid.appendChild(tile);
 });

}

function buildAZ(items){
 const nav=document.getElementById("azNav");
 nav.innerHTML="";
 const letters=[...new Set(items.map(i=>i.title[0].toUpperCase()))].sort();
 letters.forEach(l=>{
  const span=document.createElement("span");
  span.textContent=l;
  span.onclick=()=>scrollToLetter(l);
  nav.appendChild(span);
 });
}

function scrollToLetter(letter){
 const tiles=[...document.querySelectorAll(".tile")];
 const match=tiles.find(t=>t.dataset.title.startsWith(letter.toLowerCase()));
 if(match) match.scrollIntoView({behavior:"smooth"});
}

document.getElementById("search").addEventListener("input",filterTiles);
document.getElementById("tagFilter").addEventListener("change",filterTiles);

function filterTiles(){
 const term=document.getElementById("search").value.toLowerCase();
 const tag=document.getElementById("tagFilter").value;

 const tiles=[...document.querySelectorAll(".tile")];

 tiles.sort((a,b)=>{
  const aBoost=a.dataset.keywords.includes(term)?-1:0;
  const bBoost=b.dataset.keywords.includes(term)?-1:0;
  return aBoost-bBoost;
 }).forEach(t=>document.getElementById("grid").appendChild(t));

 tiles.forEach(tile=>{
  const matchTitle=tile.dataset.title.includes(term);
  const matchKey=tile.dataset.keywords.includes(term);
  const matchTag=(tag==="all"||tile.dataset.tags.includes(tag));
  tile.style.display=(matchTitle||matchKey)&&matchTag?"block":"none";
 });
}

function toggleCommentary(){
 commentaryMode=!commentaryMode;
 document.querySelectorAll(".commentary").forEach(c=>{
  c.style.display=commentaryMode?"block":"none";
 });
}

const spider=document.getElementById("spider");
spider.addEventListener("mouseenter",()=>spider.style.animationPlayState="paused");
spider.addEventListener("mouseleave",()=>spider.style.animationPlayState="running");
spider.addEventListener("click",()=>{
 spider.style.animationDuration=
 spider.style.animationDuration==="10s"?"25s":"10s";
});

window.onload=()=>{
 const saved=localStorage.getItem("archiveData");
 if(saved){
  const parsed=JSON.parse(saved);
  buildArchive(parsed);
  buildAZ(parsed);
 }
};

</script>

</body>
</html>
