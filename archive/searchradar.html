<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber-Cockpit HUD with Search Engine</title>

  <style>
    /* Global styles */
    body {
      margin: 0;
      background: radial-gradient(circle at center, #000, #050505, #000);
      font-family: "Courier New", monospace;
      color: white;
      overflow: hidden;
    }

    /* Layout */
    .wrapper {
      display: grid;
      grid-template-columns: 420px 1fr;
      height: 100vh;
    }

    .sidebar {
      background: #181818;
      padding: 20px;
      overflow-y: auto;
      border-right: 1px solid #ad00ff;
    }

    h1 {
      font-size: 14px;
      letter-spacing: 3px;
      color: #6495ED; /* cornflower blue */
    }

    .controls {
      margin: 10px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    input, select, button {
      background: black;
      border: 1px solid #ad00ff;
      color: #6495ED;
      padding: 6px;
      font-size: 11px;
    }

    button:hover {
      border-color: #6495ED;
      cursor: pointer;
    }

    .tile {
      border: 1px solid #ad00ff;
      margin-bottom: 12px;
      background: black;
      transition: 0.25s ease;
    }

    .tile:hover {
      border-color: #6495ED;
    }

    .tile img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      filter: grayscale(30%);
    }

    .title {
      font-size: 11px;
      padding: 6px;
      color: #6495ED;
    }

    .badges {
      padding: 0 6px 6px 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .badge {
      font-size: 9px;
      border: 1px solid #ad00ff;
      padding: 2px 4px;
      color: #b8c6ff;
    }

    /* -------------------- HOLOGRAM FLOAT GAUGES ------------------ */
    .holo {
      position: absolute;
      color: #00ffee;
      opacity: 0.8;
      text-shadow:
        0 0 12px #00ffee,
        0 0 18px #ad00ff;
      font-size: 1em;
      pointer-events: none;
    }

    /* Animated percent ring */
    .percent-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid rgba(0,255,238,0.15);
      position: relative;
    }

    .percent-fill {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 4px solid #00ffee;
      clip-path: polygon(50% 50%, 100% 0, 100% 100%);
      animation: fillRotate 6s linear infinite;
    }

    @keyframes fillRotate {
      from { transform: rotate(0); }
      to { transform: rotate(360deg); }
    }

    /* Radar */
    .radar {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 3px solid #39ff14;
      position: relative;
      overflow: hidden;
    }

    .radar-sweep {
      position: absolute;
      width: 100%;
      height: 100%;
      background: conic-gradient(
        rgba(57,255,20,0.5),
        rgba(57,255,20,0) 25%
      );
      animation: radarSpin 4s linear infinite;
    }

    @keyframes radarSpin {
      from { transform: rotate(0); }
      to { transform: rotate(360deg); }
    }

    /* Oscilloscope */
    .osc {
      width: 180px;
      height: 80px;
      border: 2px solid #ad00ff;
      background: rgba(0,0,0,0.5);
      overflow: hidden;
      position: relative;
    }

    .osc-wave {
      position: absolute;
      width: 300%;
      height: 100%;
      background: url("data:image/svg+xml,\
      <svg xmlns='http://www.w3.org/2000/svg' width='600' height='80'>\
          <polyline points='0,40 50,20 100,60 150,20 200,40 250,10 300,70 350,20 400,60 450,20 500,40 550,10 600,40'\
          fill='none' stroke='%23ad00ff' stroke-width='3'/>\
      </svg>") repeat-x;
      animation: oscMove 2s linear infinite;
    }

    @keyframes oscMove {
      from { transform: translateX(0); }
      to { transform: translateX(-33%); }
    }

    /* ---------------------- SPEED-UP ANIMATIONS ON SEARCH ---------------------- */
    .speed-up .percent-fill {
      animation-duration: 1s !important;
    }

    .speed-up .radar-sweep {
      animation-duration: 2s !important;
    }

    .speed-up .osc-wave {
      animation-duration: 1s !important;
    }

    /* Floating gauge placement */
    #rpm { top: 60px; left: 8%; }
    #alt { top: 60px; right: 8%; }
    #fuel { bottom: 60px; left: 10%; }
    #osc { bottom: 60px; right: 10%; }
    #radar { top: 45%; left: calc(50% - 80px); }

  </style>
</head>

<body>

<!-- BOOT SEQUENCE -->
<div id="bootScreen">
  INITIALIZING AVIONICS...
  POWER GRID: ONLINE
  HYDRAULIC PRESSURE: NOMINAL
  SCANNING INSTRUMENTATION...
  NAV MODULE: OK
  FLIGHT CONTROL CPU: OK
  BOOTING HOLOGRAPHIC HUD SYSTEM...
</div>

<!-- SOFT KEY NOTE SOUND -->
<audio id="bootTone" preload="auto">
  <source src="data:audio/wav;base64,UklGRhQAAABXQVZFZm10IBAAAAABAAEAgD4AAIA+AAABAAgAZGF0YQA..." type="audio/wav">
</audio>

<!-- COCKPIT -->
<div id="cockpit" class="cockpit-container">
  <h1 class="gradient-title">Cyber Goth Cockpit HUD</h1>

  <!-- Floating hologram gauges -->
  <div class="holo" id="rpm">
    <div class="percent-ring"><div class="percent-fill"></div></div>
    <center>RPM</center>
  </div>

  <div class="holo" id="radar">
    <div class="radar"><div class="radar-sweep"></div></div>
    <center>RADAR</center>
  </div>

  <div class="holo" id="osc">
    <div class="osc"><div class="osc-wave"></div></div>
    <center>OSCILLOSCOPE</center>
  </div>

  <!-- Search Bar -->
  <div class="controls">
    <input type="text" id="search" placeholder="Search for something..." />
  </div>

  <!-- Main Screen -->
  <div class="mainframe">
    <div class="mainframe-content" id="mainframeContent">Awaiting Commands...</div>
  </div>

  <!-- Switch Panel -->
  <div class="switches">
    <div class="switch" data-switch="bio">Instagram Bio</div>
    <div class="switch" data-switch="recipe">Cheesecake Recipe</div>
    <div class="switch" data-switch="mp3">MP3</div>
    <div class="switch" data-switch="quiz">Lore Quiz</div>
  </div>

  <!-- Sidebar with Tiles -->
  <div class="sidebar">
    <div id="searchResults"></div>
  </div>
</div>

<script>
// -------------------- BOOT SEQUENCE -------------------- //
setTimeout(() => {
  document.getElementById("bootTone").play();
}, 800);

setTimeout(() => {
  document.getElementById("bootScreen").style.display = "none";
  document.getElementById("cockpit").style.opacity = "1";
}, 3000);

// --------------------- SEARCH FUNCTIONALITY -------------------- //

const websites = [
  { title: "Chat Cafe", url: "https://example.com/chat", tags: ["chat", "cafe", "guild"] },
  { title: "Quest Adventures", url: "https://example.com/quest", tags: ["quest", "adventure", "guild"] },
  { title: "Cafe Menu", url: "https://example.com/menu", tags: ["menu", "cafe", "food"] },
  { title: "Character Profiles", url: "https://example.com/character", tags: ["chat", "profiles", "guild"] },
];

const searchInput = document.getElementById("search");
const searchResultsContainer = document.getElementById("searchResults");

searchInput.addEventListener("input", function (e) {
  const searchTerm = e.target.value.toLowerCase();
  
  // Speed-up animations
  if (searchTerm) {
    document.body.classList.add('speed-up');
  } else {
    document.body.classList.remove('speed-up');
  }

  // Clear current results
  searchResultsContainer.innerHTML = "";

  // Filter websites by search term
  websites.forEach((site) => {
    if (site.title.toLowerCase().includes(searchTerm) || site.tags.some(tag => tag.toLowerCase().includes(searchTerm))) {
      const tile = document.createElement("div");
      tile.classList.add("tile");
      tile.innerHTML = `
        <a href="${site.url}" target="_blank">
          <img src="https://via.placeholder.com/400x140?text=${site.title}" alt="${site.title}">
          <div class="title">${site.title}</div>
        </a>
        <div class="badges">${site.tags.map(tag => `<span class="badge">${tag}</span>`).join("")}</div>
      `;
      searchResultsContainer.appendChild(tile);
    }
  });
});

</script>

</body>
</html>
