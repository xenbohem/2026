<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pirate TV</title>

<style>

body{
margin:0;
background:#0b0b0b;
font-family:monospace;
overflow:hidden;
color:#00ff99;
}

/* CHANNEL LIST */

#channels{
position:fixed;
left:20px;
top:50%;
transform:translateY(-50%);
z-index:10;
}

#channels a{
display:block;
color:#00ff99;
text-decoration:none;
margin:6px 0;
cursor:pointer;
}

#channels a:hover{
color:white;
}

/* TV */

#tv{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-3deg);
width:720px;
height:420px;
background:black;
border:14px solid #111;
box-shadow:0 0 80px black;
overflow:hidden;
}

/* VIDEO + STATIC */

#screen{
width:100%;
height:100%;
position:relative;
}

video{
width:100%;
height:100%;
object-fit:cover;
position:absolute;
}

/* STATIC OVERLAY */

#static{

position:absolute;
inset:0;

background:
repeating-linear-gradient(
0deg,
#000 0px,
#111 2px,
#000 4px
);

opacity:0;
pointer-events:none;

}

/* POWER BUTTON */

#power{
position:absolute;
bottom:10px;
right:10px;
background:#111;
color:#0f0;
border:none;
padding:6px 12px;
cursor:pointer;
}

/* FLOATING NOTES */

.note{

position:absolute;
width:180px;
height:140px;
background:white;
overflow:hidden;
cursor:grab;

clip-path:polygon(
2% 6%,10% 0%,92% 3%,99% 9%,
97% 93%,88% 100%,8% 96%,1% 90%
);

box-shadow:0 6px 18px rgba(0,0,0,.6);

animation:drift 8s infinite alternate ease-in-out;

}

.note img{
width:100%;
height:100%;
object-fit:cover;
}

/* TAPE */

.tape{

position:absolute;
width:60px;
height:16px;

background:rgba(255,255,200,.7);

top:-10px;
left:60px;

transform:rotate(-6deg);

}

/* FLOAT */

@keyframes drift{

0%{transform:translateY(-6px)}
100%{transform:translateY(6px)}

}

/* FADE */

.fade{
animation:fade .7s forwards;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

</style>
</head>

<body>

<!-- CHANNELS -->

<div id="channels">

<a onclick="changeChannel('https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4')">ART</a>

<a onclick="changeChannel('https://www.w3schools.com/html/mov_bbb.mp4')">DIY</a>

<a onclick="changeChannel('https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm')">MUSIC</a>

</div>

<!-- TV -->

<div id="tv">

<div id="screen">

<video id="player" autoplay loop controls></video>

<div id="static"></div>

</div>

<button id="power">POWER</button>

</div>

<!-- SOUNDS -->

<audio id="powerSound"
src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6c3c0d7c62.mp3?filename=retro-click-23667.mp3"></audio>

<audio id="staticSound"
src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_5a9c9d21e5.mp3?filename=tv-static-6384.mp3"></audio>

<script>

/* CHANNEL SWITCH WITH STATIC */

function changeChannel(src){

let v=document.getElementById("player")
let staticLayer=document.getElementById("static")
let noise=document.getElementById("staticSound")

staticLayer.style.opacity=1

noise.currentTime=0
noise.play()

setTimeout(()=>{

v.src=src
v.play()

staticLayer.style.opacity=0

},800)

}

/* POWER BUTTON */

let on=true

power.onclick=()=>{

let tv=document.getElementById("tv")
let sound=document.getElementById("powerSound")

sound.currentTime=0
sound.play()

on=!on

tv.style.opacity=on?1:0

}

/* PORTAL NOTES DATA */

let notesData=[

{
img:"https://xenbohem.github.io/2026/RETROTV/PUNKCAFE/chimeraescapecafe1.jpg",
type:"link",
value:"https://x3nb.github.io/shrinkingviolets/glitch-realms.html"
},

{
img:"https://picsum.photos/300?2",
type:"channel",
value:"https://www.w3schools.com/html/mov_bbb.mp4"
},

{
img:"https://picsum.photos/300?3",
type:"text",
value:"The signal repeats every night."
},

{
img:"https://xenbohem.github.io/2026/RETROTV/PUNKCAFE/mikineko1.jpg",
type:"sound",
value:"https://cdn.pixabay.com/download/audio/2022/03/15/audio_6c3c0d7c62.mp3"
},

{
img:"https://xenbohem.github.io/2026/RETROTV/PUNKCAFE/starcat.jpg",
type:"image",
value:"https://picsum.photos/800"
}

]

function handlePortal(data){

if(data.type==="link") window.open(data.value)

else if(data.type==="channel") changeChannel(data.value)

else if(data.type==="text") alert(data.value)

else if(data.type==="sound") new Audio(data.value).play()

else if(data.type==="image"){

let w=window.open("")
w.document.write("<img src='"+data.value+"' style='width:100%'>")

}

}

/* CREATE NOTE */

function createNote(){

let data=notesData[Math.floor(Math.random()*notesData.length)]

let note=document.createElement("div")
note.className="note fade"

let img=document.createElement("img")
img.src=data.img

let tape=document.createElement("div")
tape.className="tape"

note.appendChild(img)
note.appendChild(tape)

note.onclick=()=>handlePortal(data)

/* RANDOM POSITION */

note.style.top=Math.random()*80+"%"
note.style.left=Math.random()*80+"%"

let rot=(Math.random()*20)-10
let scale=.8+Math.random()*.4

note.style.transform=
"rotate("+rot+"deg) scale("+scale+")"

document.body.appendChild(note)

dragElement(note)

}

/* DRAGGING */

function dragElement(el){

let x=0,y=0,dx=0,dy=0

el.onmousedown=dragMouseDown

function dragMouseDown(e){

e.preventDefault()

dx=e.clientX
dy=e.clientY

document.onmouseup=closeDrag
document.onmousemove=elementDrag

}

function elementDrag(e){

e.preventDefault()

x=dx-e.clientX
y=dy-e.clientY

dx=e.clientX
dy=e.clientY

el.style.top=(el.offsetTop-y)+"px"
el.style.left=(el.offsetLeft-x)+"px"

}

function closeDrag(){

document.onmouseup=null
document.onmousemove=null

}

}

/* CREATE ONLY 7 NOTES */

for(let i=0;i<7;i++){

createNote()

}

</script>

</body>
</html>
