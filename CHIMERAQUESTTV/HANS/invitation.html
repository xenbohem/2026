<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Royal Tea & Manners Academy</title>
<!-- Use a clean, friendly font -->
<link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet" />
<style>
  body {
    margin: 0;
    font-family: 'Open Sans', sans-serif;
    background-color: #6495ED; /* Cornflower Blue */
    color: #fff;
    text-align: center;
  }

  /* Loading Screen */
#loading {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-size: 2em;
  font-weight: bold;
  background-color: #4B0082; /* Deep Purple */
}

#loading span {
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.4; }
  100% { opacity: 1; }
}

/* Main Content (hidden initially) */
#main {
  display: none;
  padding: 30px;
}

h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 3em;
  margin-bottom: 20px;
  color: #ffd700; /* Gold for royalty */
}

button {
  background-color: #4B0082;
  color: #fff;
  border: none;
  padding: 12px 24px;
  font-size: 1.2em;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 20px;
}

button:hover {
  background-color: #6000b0;
}

/* Quiz container */
.quiz-container {
  max-width: 600px;
  margin: 20px auto;
  background-color: #fff;
  color: #000;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  color: #333;
}

#question {
  font-size: 1.2em;
  margin-bottom: 15px;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option {
  background-color: #eee;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.option:hover {
  background-color: #ddd;
}

/* Celebration icon (hidden initially) */
#celebration {
  display: none;
  margin-top: 30px;
}

.teacup {
  font-size: 3em;
  color: #ffd700;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #ffd700; }
  to { text-shadow: 0 0 20px #ffd700; }
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading">
  <span>Preparing the Royal Tea Room...</span>
</div>

<!-- Main Content -->
<div id="main">
  <h1>Welcome to the Royal Tea & Manners Academy</h1>
  <p>Prince Louis invites you to his Tea Etiquette Apprenticeship! To proceed, you must pass a short quiz about royal tea customs.</p>
  <button id="startBtn">Begin the Quest</button>
  
  <div class="quiz-container" id="quiz" style="display:none;">
    <div id="question"></div>
    <div class="options" id="options"></div>
    <div id="feedback" style="margin-top:15px; font-weight:bold;"></div>
  </div>
  
  <div id="celebration">
    <div class="teacup">☕</div>
    <h2>Congratulations! You are now an Official Apprentice!</h2>
    <a href="tea_academy.html" target="_blank" id="proceedLink" style="font-size:1.2em; text-decoration:none; color:#fff; background-color:#4B0082; padding:10px 20px; border-radius:8px;">Enter the Tea & Manners Academy</a>
  </div>
</div>

<script>
  // Simulate loading delay
window.onload = () => {
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';
  }, 2000);
};

const questions = [
  {
    question: "What time is traditional for afternoon tea in British and French customs?",
    options: ["10 AM", "12 PM", "4 PM", "8 PM"],
    answer: 2,
  },
  {
    question: "Which of these is NOT a typical French tea accompaniment?",
    options: ["Croissants", "Petit fours", "Scones", "Éclairs"],
    answer: 2,
  },
  {
    question: "How should the tea be poured during Prince Louis's custom?",
    options: ["By the guest", "By the host with grace", "Using a ladle", "With a spoon"],
    answer: 1,
  },
  {
    question: "What is a key aspect of proper tea etiquette?",
    options: ["Gulping the tea", "Polite, gentle conversation", "Talking loudly", "Eating with hands"],
    answer: 1,
  },
  {
    question: "What kind of tea might Prince Louis prefer?",
    options: ["Earl Grey", "Chamomile", "Green Tea", "All of the above"],
    answer: 3,
  },
  {
    question: "What should be done after finishing the tea?",
    options: ["Leave the cup on the table", "Politely thank the host", "Pour more tea", "Stand abruptly"],
    answer: 1,
  },
  {
    question: "Which material best represents Prince Louis's tea set?",
    options: ["Plastic", "Fine porcelain", "Ceramic mug", "Glass cup"],
    answer: 1,
  },
];

let currentQuestionIndex = 0;

document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('startBtn').style.display = 'none';
  loadQuestion();
});

function loadQuestion() {
  const q = questions[currentQuestionIndex];
  document.getElementById('question').textContent = q.question;
  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = '';
  q.options.forEach((opt, index) => {
    const btn = document.createElement('div');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(index);
    optionsDiv.appendChild(btn);
  });
  document.getElementById('feedback').textContent = '';
}

function checkAnswer(selectedIndex) {
  const q = questions[currentQuestionIndex];
  if (selectedIndex === q.answer) {
    // Correct answer
    currentQuestionIndex++;
    if (currentQuestionIndex < questions.length) {
      loadQuestion();
    } else {
      // Completed all questions
      document.getElementById('quiz').style.display = 'none';
      showCelebration();
    }
  } else {
    // Wrong answer
    document.getElementById('feedback').textContent = "Gently remind to try again. Let's review the etiquette!";
    // Optional: Add a slight shake animation or sound
  }
}

function showCelebration() {
  document.getElementById('celebration').style.display = 'block';
}
</script>
</body>
</html>
