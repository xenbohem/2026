```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chimera Café</title>

<style>

/* -------------------- GLOBAL -------------------- */

body{
margin:0;
font-family:Courier New, monospace;
background:#0a0a2a;
color:#e0e0ff;
overflow:hidden;
}

/* scanlines */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(rgba(0,0,0,0)50%,rgba(0,0,0,.25)50%);
background-size:100% 4px;
pointer-events:none;
}

/* -------------------- STAGE 1 LOADING -------------------- */

#bootScreen{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:#00ff9f;

display:flex;
align-items:center;
justify-content:center;
flex-direction:column;

font-size:22px;

z-index:1000;

}

#bootMessage{

margin-top:20px;
font-size:18px;

}

/* -------------------- STAGE 2 CRT VIDEO -------------------- */

#crtStage{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:black;

display:none;
align-items:center;
justify-content:center;

z-index:900;

}

/* crooked CRT */

.crt{

transform:rotate(-4deg);

background:#111;

padding:25px;

border-radius:20px;

box-shadow:
0 0 40px purple,
0 0 80px violet;

}

/* CRT screen */

.crt-screen{

background:black;

padding:10px;

border-radius:10px;

overflow:hidden;

}

/* video */

.crt video{

width:720px;
max-width:90vw;

filter:
contrast(1.2)
brightness(1.1)
saturate(1.2);

}

/* -------------------- MAIN WEBSITE -------------------- */

#site{

display:none;

max-width:900px;
margin:auto;

margin-top:60px;

background:rgba(40,40,80,.9);

border:4px solid #8a2be2;

padding:30px;

}

h1{

text-align:center;
margin-bottom:20px;

}

/* tabs */

.tabs{

display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;

}

.tab{

padding:8px 16px;

background:#4a00e0;

cursor:pointer;

border-radius:6px;

}

.tab.active{

background:#ff6b6b;

}

/* search */

#search{

width:100%;
padding:10px;
margin-bottom:20px;

background:#1a1a2a;

border:2px solid #4a00e0;

color:#00ff88;

}

/* lore cards */

.card{

background:rgba(60,60,100,.7);
padding:12px;
margin-bottom:10px;
border:2px solid #4a00e0;

}

/* library */

.shelf{

display:flex;
gap:12px;
background:#1a1a2a;
padding:14px;
margin-top:20px;

border:3px solid #4a00e0;

}

.book{

background:#8a2be2;
padding:10px;
cursor:pointer;

transition:.3s;

}

.book:hover{

transform:translateY(-5px);

}

.book.open{

background:#ff6b6b;
transform:translateX(40px);

}

/* audio */

#audioSection{

margin-top:30px;
border:2px solid #8a2be2;
padding:20px;

}

button{

padding:10px 18px;
background:#ff6b6b;
border:none;
cursor:pointer;

}

.progress{

height:10px;
background:#333;
margin-top:10px;

}

.fill{

height:100%;
background:#00ff88;
width:0%;

}

</style>
</head>

<body>

<!-- LOADING SCREEN -->

<div id="bootScreen">

<div>Café Loading In Progress...</div>

<div id="bootMessage">Preparing Systems...</div>

</div>

<!-- CRT VIDEO -->

<div id="crtStage">

<div class="crt">

<div class="crt-screen">

<video id="introVideo" muted playsinline>

<source src="https://xenbohem.github.io/2026/CHIMERAQUESTTV/PODCAST/Chimeracyberpunkwelcome.mp4">

</video>

</div>

</div>

</div>

<!-- MAIN WEBSITE -->

<div id="site">

<h1>Chimera Café</h1>

<div class="tabs">

<div class="tab active" data-char="all">All</div>
<div class="tab" data-char="hans">Hans</div>
<div class="tab" data-char="milo">Milo</div>
<div class="tab" data-char="star">Star</div>

</div>

<input id="search" placeholder="Search the lore...">

<div id="results"></div>

<h2>Hans Library</h2>

<div class="shelf">

<div class="book">Tea Etiquette</div>
<div class="book">Cafe History</div>
<div class="book">Potion Recipes</div>
<div class="book">Secret Archives</div>

</div>

<div id="bookText"></div>

<div id="audioSection">

<h2>Podcast</h2>

<button id="play">Play</button>

<div class="progress">
<div class="fill" id="audioFill"></div>
</div>

<audio id="audio">
<source src="audio/ch1_intro.mp3">
</audio>

</div>

</div>

<script>

/* ---------- BOOT SEQUENCE ---------- */

const bootMessages=[

"Preparing Hans Library...",
"Brewing Tea Archives...",
"Connecting Chimera Network...",
"Initializing Café Interface..."

]

let i=0

const bootText=document.getElementById("bootMessage")

function nextBoot(){

if(i<bootMessages.length){

bootText.innerText=bootMessages[i]

i++

setTimeout(nextBoot,1500)

}

}

nextBoot()

/* move to video */

setTimeout(()=>{

document.getElementById("bootScreen").style.display="none"

const crt=document.getElementById("crtStage")

crt.style.display="flex"

const vid=document.getElementById("introVideo")

vid.play()

},7000)

/* reveal site */

setTimeout(()=>{

document.getElementById("crtStage").style.display="none"

document.getElementById("site").style.display="block"

document.body.style.overflow="auto"

},17000)

/* ---------- LORE SYSTEM ---------- */

const lore=[

{title:"Tea Etiquette",char:"hans",text:"Hans teaches the proper ceremony of tea."},

{title:"Potion Experiments",char:"milo",text:"Milo explores strange alchemical brews."},

{title:"Star Navigation",char:"star",text:"Star studies cosmic patterns above the café."},

{title:"Café Origins",char:"all",text:"The Chimera Café was founded as a sanctuary."}

]

const results=document.getElementById("results")
const search=document.getElementById("search")

function render(){

results.innerHTML=""

const key=search.value.toLowerCase()

lore.forEach(l=>{

if(l.title.toLowerCase().includes(key)||l.text.toLowerCase().includes(key)){

let d=document.createElement("div")

d.className="card"

d.innerHTML="<b>"+l.title+"</b><br>"+l.text

results.appendChild(d)

}

})

}

search.addEventListener("input",render)

render()

/* ---------- LIBRARY ---------- */

document.querySelectorAll(".book").forEach(b=>{

b.onclick=()=>{

document.querySelectorAll(".book").forEach(x=>x.classList.remove("open"))

b.classList.add("open")

document.getElementById("bookText").innerHTML="Opening "+b.innerText+"..."

}

})

/* ---------- AUDIO ---------- */

const audio=document.getElementById("audio")
const play=document.getElementById("play")
const fill=document.getElementById("audioFill")

play.onclick=()=>audio.play()

audio.addEventListener("timeupdate",()=>{

if(audio.duration){

fill.style.width=(audio.currentTime/audio.duration*100)+"%"

}

})

</script>

</body>
</html>
```
