<!DOCTYPE html>

<html lang="en">
<head><script src="/.nekoweb-api/static/site.js" type="text/javascript" defer></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Royal Tea & Manners Academy</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Playfair Display',serif;
background:#4B0082;
color:white;
text-align:center;
}

header{
padding:20px;
font-size:2.2em;
color:#ffd700;
border-bottom:4px solid #ffd700;
}

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#4B0082;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
color:#ffd700;
}

button{
padding:12px 24px;
font-size:1.2em;
background:#ffd700;
color:#4B0082;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#e6c200;
}

#academy{
display:none;
}

.lesson{
display:none;
max-width:900px;
margin:auto;
margin-top:40px;
padding:20px;
background:rgba(255,255,255,0.2);
border-radius:15px;
border:2px solid #ffd700;
}

.option{
display:block;
margin:10px auto;
padding:10px;
width:70%;
border-radius:8px;
border:none;
cursor:pointer;
}

.option:hover{
background:#ffd700;
}

#progress{
background:white;
color:#4B0082;
width:350px;
margin:auto;
margin-top:20px;
border-radius:10px;
padding:10px;
}

.badge{
font-size:1.5em;
}

#certificate{
display:none;
margin-top:40px;
}

canvas{
border:4px solid #ffd700;
}

footer{
margin-top:50px;
color:#ffd700;
padding:20px;
}

</style>

</head>

<body>

<div id="loading">
<h1>Royal Tea & Manners Academy</h1>
<p>Preparing your royal lessons...</p>
</div>

<header>Royal Tea & Manners Academy</header>

<div id="welcome">

<h2>Welcome, Noble Student</h2>

<p>Please enter your name to begin your royal training.</p>

<input id="studentName" placeholder="Your Name" style="padding:10px;font-size:1.1em;border-radius:6px;border:none">

<br><br>

<button id="startBtn">Begin Royal Journey</button>

</div>

<div id="academy">

<div id="progress">
<h3>Your Royal Progress</h3>
<ul id="progressList"></ul>
</div>

<div id="lessonBox" class="lesson">

<h2 id="lessonTitle"></h2>

<p id="question"></p>

<div id="options"></div>

<button id="nextBtn">Next Question</button>

</div>

</div>

<div id="certificate">

<h2>Royal Certificate</h2>

<canvas id="certCanvas" width="800" height="500"></canvas>

<br>

<button id="downloadCert">Download Certificate</button>

<br>

<button id="restart">Restart Academy</button>

</div>

<footer>
Long Live the Royal Tea & Manners Academy
</footer>

<script>

setTimeout(()=>{
document.getElementById("loading").style.display="none";
},2000);

const lessons=[

{
title:"History of Royal Tea",
badge:"☕",
questions:[
{q:"Tea originated in which country?",o:["China","France","England","India"],a:0},
{q:"Who popularized afternoon tea?",o:["Queen Victoria","Henry VIII","Elizabeth I","George III"],a:0}
]
},

{
title:"Tea Etiquette",
badge:"🍵",
questions:[
{q:"How should a teacup be held?",o:["Pinky raised","Pinky down grip","Two hands","From rim"],a:1},
{q:"Tea is often served with?",o:["Scones","Burgers","Pizza","Soup"],a:0}
]
},

{
title:"Table Manners",
badge:"🍽️",
questions:[
{q:"Napkin placement?",o:["Lap","Table","Chair","Collar"],a:0},
{q:"Finished utensils position?",o:["Parallel","Crossed","Hidden","Table"],a:0}
]
},

{
title:"Conversation Etiquette",
badge:"💬",
questions:[
{q:"Tea conversation should be?",o:["Loud","Polite","Silent","Argumentative"],a:1},
{q:"Best topics?",o:["Art & culture","Arguments","Politics","Gossip"],a:0}
]
},

{
title:"Tea Decor",
badge:"🌸",
questions:[
{q:"Royal tea decor includes?",o:["Fine china","Plastic cups","Paper plates","None"],a:0},
{q:"Colors often used?",o:["Neon","Jewel tones","Grey","Black"],a:1}
]
},

{
title:"Dress Code",
badge:"👑",
questions:[
{q:"Royal tea attire?",o:["Formal wear","Sportswear","Pajamas","Beachwear"],a:0},
{q:"Accessories may include?",o:["Gloves","Sneakers","Hats backward","None"],a:0}
]
},

{
title:"Final Royal Ceremony",
badge:"🏆",
questions:[
{q:"Final ceremony demonstrates?",o:["Etiquette mastery","Cooking","Dance","History only"],a:0},
{q:"Completion earns?",o:["Certificate","Nothing","Food","Money"],a:0}
]
}

];

let lessonIndex=0;
let questionIndex=0;
let student="";

const lessonBox=document.getElementById("lessonBox");
const titleEl=document.getElementById("lessonTitle");
const questionEl=document.getElementById("question");
const optionsEl=document.getElementById("options");

document.getElementById("startBtn").onclick=()=>{

student=document.getElementById("studentName").value;

if(!student){
alert("Please enter your name.");
return;
}

document.getElementById("welcome").style.display="none";
document.getElementById("academy").style.display="block";

lessonBox.style.display="block";

loadQuestion();

};

function loadQuestion(){

const lesson=lessons[lessonIndex];
const q=lesson.questions[questionIndex];

titleEl.textContent=lesson.title;
questionEl.textContent=q.q;

optionsEl.innerHTML="";

q.o.forEach((opt,i)=>{

const btn=document.createElement("button");
btn.className="option";
btn.textContent=opt;

btn.onclick=()=>{

if(i===q.a){
btn.style.background="green";
}else{
btn.style.background="red";
}

Array.from(optionsEl.children).forEach(b=>b.disabled=true);

};

optionsEl.appendChild(btn);

});

}

document.getElementById("nextBtn").onclick=()=>{

questionIndex++;

if(questionIndex<lessons[lessonIndex].questions.length){

loadQuestion();

}else{

localStorage.setItem("lesson"+lessonIndex,"done");

updateProgress();

lessonIndex++;
questionIndex=0;

if(lessonIndex<lessons.length){

loadQuestion();

}else{

finishAcademy();

}

}

};

function updateProgress(){

const list=document.getElementById("progressList");
list.innerHTML="";

for(let i=0;i<lessons.length;i++){

if(localStorage.getItem("lesson"+i)){

const li=document.createElement("li");

li.innerHTML=lessons[i].badge+" Lesson "+(i+1)+" Completed";

list.appendChild(li);

}

}

}

function finishAcademy(){

document.getElementById("academy").style.display="none";

document.getElementById("certificate").style.display="block";

generateCert();

}

function generateCert(){

const canvas=document.getElementById("certCanvas");
const ctx=canvas.getContext("2d");

ctx.fillStyle="#fff8dc";
ctx.fillRect(0,0,800,500);

ctx.strokeStyle="#b8860b";
ctx.lineWidth=8;
ctx.strokeRect(10,10,780,480);

ctx.fillStyle="#4B0082";

ctx.font="bold 36px serif";
ctx.textAlign="center";

ctx.fillText("Royal Certificate of Achievement",400,120);

ctx.font="26px serif";

ctx.fillText(student,400,220);

ctx.font="20px serif";

ctx.fillText("Has Mastered the Royal Tea & Manners Academy",400,280);

ctx.fillText(new Date().toLocaleDateString(),400,340);

}

document.getElementById("downloadCert").onclick=()=>{

const link=document.createElement("a");
link.download="RoyalCertificate.png";
link.href=document.getElementById("certCanvas").toDataURL();
link.click();

};

document.getElementById("restart").onclick=()=>{

localStorage.clear();
location.reload();

};

updateProgress();

</script>

</body>
</html>
